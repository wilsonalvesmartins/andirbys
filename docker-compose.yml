version: '3.8'

services:
  webapp:
    build: .
    # Mudei o nome do container para evitar conflitos com os antigos
    container_name: andirbys-pizza-app 
    ports:
      # Mapeia a porta 3002 da sua VPS para a porta 3002 do container
      - "3002:3002"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
