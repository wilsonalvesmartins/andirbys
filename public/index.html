<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andirby's Pizzaria & Esfiharia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; width: 80mm; margin: 0; padding: 0; font-family: monospace; font-size: 13px; color: black; }
            @page { margin: 0; }
        }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #b91c1c; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .bg-andirby-red { background-color: #990000; }
        .text-andirby-yellow { color: #FFCC00; }
        .bg-andirby-yellow { background-color: #FFCC00; }
        .hover-bg-andirby-red:hover { background-color: #7a0000; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-andirby-red text-white shadow-md sticky top-0 z-50" id="main-nav">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-2xl font-black text-andirby-yellow tracking-wide flex items-center gap-2 cursor-pointer" onclick="navigate('menu')">
                🍕 Andirby's
            </h1>
            <div class="flex items-center gap-4">
                <button onclick="navigate('my_orders')" class="text-sm font-bold text-white hover:text-andirby-yellow transition hidden sm:block">Meus Pedidos</button>
                <button onclick="navigate('my_orders')" class="text-xl font-bold text-white hover:text-andirby-yellow transition sm:hidden" title="Meus Pedidos">📋</button>
                <div id="nav-cart" class="relative cursor-pointer bg-red-900 p-2 rounded-full hover:bg-red-950 transition" onclick="navigate('cart')">
                    🛒
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-andirby-yellow text-black font-bold text-xs rounded-full h-5 w-5 flex items-center justify-center shadow">0</span>
                </div>
            </div>
        </div>
    </nav>

    <main id="app" class="flex-grow max-w-4xl mx-auto w-full px-4 py-6"></main>

    <footer class="bg-gray-900 text-gray-400 py-6 text-center mt-auto border-t-4 border-andirby-red" id="main-footer">
        <p class="text-sm text-andirby-yellow font-bold">Andirby's Pizzaria & Esfiharia</p>
        <p class="text-xs mt-1">&copy; 2026. Todos os direitos reservados.</p>
        <span onclick="promptAdmin()" class="inline-block mt-2 cursor-pointer opacity-10 hover:opacity-100 transition-opacity" title="Área Restrita">🔒</span>
    </footer>

    <!-- Área exclusiva para Impressão -->
    <div id="print-area" class="hidden"></div>

    <!-- Modal de Sucesso Genérico -->
    <div id="success-action-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm p-6 text-center border-t-8 border-green-500">
            <div class="text-5xl mb-4">🛒</div>
            <h3 class="text-xl font-black text-gray-800 mb-2">Item Adicionado!</h3>
            <p class="text-gray-600 mb-6 text-sm">O que você deseja fazer agora?</p>
            <div class="flex flex-col gap-3">
                <button onclick="navigate('cart'); closeSuccessModal();" class="w-full bg-green-600 text-white py-3 rounded-lg font-black hover:bg-green-700 transition shadow-md">Ver Carrinho</button>
                <button onclick="closeSuccessModal();" class="w-full bg-gray-100 text-gray-800 py-3 rounded-lg font-bold hover:bg-gray-200 transition border border-gray-300">Continuar Comprando</button>
            </div>
        </div>
    </div>

    <script>
        // --- DADOS DO CARDÁPIO: INGREDIENTES EXATOS DO PDF ---
        const FLAVORS = {
            salgadas: [
                { name: "Andirby's", desc: "Frango, molho de tomate, mussarela, tomate, milho, ervilha, catupiry, cheddar, salaminho, cebola, orégano e azeitonas" },
                { name: "Atum", desc: "Atum, molho de tomate, mussarela, tomate, cebola, orégano e azeitonas" },
                { name: "Alho", desc: "Alho, molho de tomate, mussarela, tomate, cebola, orégano e azeitonas" },
                { name: "Bauru", desc: "Presunto, molho de tomate, mussarela, tomate, cebola, orégano e azeitonas" },
                { name: "Calabresa", desc: "Linguiça Calabresa, molho de tomate, mussarela, tomate, cebola, orégano e azeitonas" },
                { name: "Calabresa do Chef", desc: "Linguiça Calabresa, cream cheese, bacon, molho de tomate, mussarela, tomate, cebola, orégano e azeitonas" },
                { name: "Caliente", desc: "Linguiça Calabresa, pimenta baiana, molho de tomate, mussarela, tomate, cebola" },
                { name: "Da Nona", desc: "Presunto, mussarela, milho, molho de tomate, orégano e azeitonas" },
                { name: "Da Sogra", desc: "Carne Moída a moda do chef, pimentão, molho de tomate, mussarela, tomate picado, cebola, orégano e azeitonas" },
                { name: "Frango com Catupiry", desc: "Frango, catupiry, molho de tomate, mussarela, tomate, orégano e azeitonas" },
                { name: "Frango com Bacon", desc: "Frango, bacon, molho de tomate, mussarela, tomate, orégano e azeitonas" },
                { name: "Hollywood", desc: "Presunto enrolado com mussarela, bacon, cream cheese, molho de tomate, milho, ervilha, tomate, orégano e azeitonas" },
                { name: "Hulk", desc: "Rúcula, tomate seco, molho de tomate, milho, orégano e azeitonas" },
                { name: "Damep", desc: "Brócolis, bacon, tomate seco, requeijão, molho de tomate, mussarela, tomate cereja, milho, orégano e azeitonas" },
                { name: "Lombinho", desc: "Lombinho, molho de tomate, mussarela, tomate, milho, orégano e azeitonas" },
                { name: "Marguerita", desc: "Mussarela, folhas de manjericão, molho de tomate, tomate cereja, orégano e azeitonas" },
                { name: "Mussarela", desc: "Mussarela, molho de tomate, rodelas de tomate, orégano e azeitonas" },
                { name: "Portuguesa", desc: "Presunto, mussarela, ovos, molho de tomate, milho, ervilha, cebola, orégano e azeitonas" },
                { name: "Quatro Queijos", desc: "Mussarela, gorgonzola, catupiry, parmesão, molho de tomate, orégano e azeitonas" }
            ],
            doces: [
                { name: "Chocolate ao leite", desc: "Chocolate, granulado e morango" },
                { name: "Banana e Canela", desc: "Banana, canela, mussarela, açúcar e leite condensado" },
                { name: "Romeu e Julieta", desc: "Mussarela e goiaba" }
            ],
            esfihas: [
                { name: "Alho" }, { name: "Bacon" }, { name: "Carne" }, { name: "Calabresa" }, 
                { name: "Frango c/ Catupiry" }, { name: "Frango c/ Cheddar" }, { name: "Presunto e Queijo" }, 
                { name: "Banana c/ Canela" }, { name: "Chocolate ao leite" }, { name: "Chocolate Branco" }, { name: "Romeu e Julieta" }
            ]
        };

        const state = {
            view: 'menu',
            items: [],
            settings: { delivery_fee: 0, webhook_url: '', is_open: '1', unavailable_flavors: [] },
            cart: [],
            userData: { whatsapp: '', name: '', address: '' },
            adminToken: localStorage.getItem('adminToken') || null,
            adminOrders: [],
            modalItem: null
        };

        let audioCtx = null;
        let orderPollingInterval = null;
        let lastKnownOrderId = -1;

        function initAudio() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        function playDingDong() {
            try {
                initAudio();
                const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.5, audioCtx.currentTime); gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.start(audioCtx.currentTime); osc1.stop(audioCtx.currentTime + 0.3);

                const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                osc2.type = 'sine'; osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.3);
                gain2.gain.setValueAtTime(0.5, audioCtx.currentTime + 0.3); gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
                osc2.connect(gain2); gain2.connect(audioCtx.destination);
                osc2.start(audioCtx.currentTime + 0.3); osc2.stop(audioCtx.currentTime + 0.8);
            } catch(e) { console.error("Erro no áudio:", e); }
        }

        async function init() {
            await fetchMenuData();
            render();
        }

        async function fetchMenuData() {
            try {
                const res = await fetch('/api/menu');
                const data = await res.json();
                state.items = data.items;
                state.settings.delivery_fee = parseFloat(data.settings.delivery_fee) || 0;
                state.settings.webhook_url = data.settings.webhook_url || '';
                state.settings.is_open = data.settings.is_open || '1';
                state.settings.unavailable_flavors = data.settings.unavailable_flavors ? JSON.parse(data.settings.unavailable_flavors) : [];
            } catch (e) { showToast("Erro de conexão"); }
        }

        function navigate(view) {
            state.view = view;
            document.getElementById('nav-cart').style.display = (view === 'admin_orders' || view === 'admin_menu') ? 'none' : 'block';
            window.scrollTo(0, 0);
            render();
        }

        function render() {
            const app = document.getElementById('app');
            document.getElementById('cart-count').innerText = state.cart.length;

            if (state.view === 'menu') app.innerHTML = renderMenu();
            else if (state.view === 'cart') app.innerHTML = renderCart();
            else if (state.view === 'checkout') app.innerHTML = renderCheckout();
            else if (state.view === 'my_orders') app.innerHTML = renderMyOrders();
            else if (state.view === 'admin_orders') { app.innerHTML = '<div class="loader mx-auto"></div>'; loadAdminOrders(); }
            else if (state.view === 'admin_menu') app.innerHTML = renderAdminMenu();
        }

        function formatMoney(value) { return `R$ ${parseFloat(value).toFixed(2).replace('.', ',')}`; }
        function formatDate(dateString) { return new Date(dateString + 'Z').toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' }); }

        function showSuccessModal() { document.getElementById('success-action-modal').classList.remove('hidden'); }
        function closeSuccessModal() { document.getElementById('success-action-modal').classList.add('hidden'); }

        function renderMenu() {
            let html = `
                <div class="mb-6">
                    <h2 class="text-3xl font-black text-andirby-red">Cardápio</h2>
                    ${state.settings.is_open === '0' ? 
                        `<div class="bg-red-100 text-red-800 p-3 rounded-lg border border-red-300 font-bold mt-2">⚠️ O Restaurante está fechado no momento.</div>` : 
                        `<p class="text-gray-500 font-bold">Faça seu pedido conosco!</p>`}
                </div>`;
            
            const categories = [...new Set(state.items.filter(i => i.category !== 'Bordas Recheadas' && i.category !== 'Pizza no Prato').map(i => i.category))];
            const catOrder = ['Pizzas Gigantes (50cm)', 'Pizzas Família (35cm)', 'Esfihas', 'Porções', 'Outros', 'Bebidas'];
            categories.sort((a, b) => {
                let idxA = catOrder.findIndex(c => a.includes(c)); let idxB = catOrder.findIndex(c => b.includes(c));
                if(idxA === -1) idxA = 99; if(idxB === -1) idxB = 99;
                return idxA - idxB;
            });
            
            categories.forEach(cat => {
                html += `<h3 class="text-xl font-bold text-andirby-red mt-8 mb-4 border-b-2 border-red-200 pb-2 flex items-center gap-2">🍕 ${cat}</h3>`;
                html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">`;
                
                const catItems = state.items.filter(i => i.category === cat);
                catItems.forEach(item => {
                    const isConfigurable = item.category.includes('Pizzas') || item.category.includes('Esfihas');
                    html += `
                        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 flex justify-between items-center hover:shadow-md transition cursor-pointer" onclick="${isConfigurable ? `openConfigModal(${item.id})` : `addSimpleItem(${item.id})`}">
                            <div class="flex-1 pr-4">
                                <h4 class="font-bold text-gray-800">${item.name}</h4>
                                ${item.description ? `<p class="text-xs text-gray-500 italic mt-1 leading-tight">${item.description}</p>` : ''}
                                <p class="text-andirby-red font-bold mt-1">${formatMoney(item.price)}</p>
                            </div>
                            <button class="bg-andirby-yellow text-black px-4 py-2 rounded-lg font-bold hover:bg-yellow-500 transition shadow shrink-0">
                                ${isConfigurable ? 'Montar' : 'Adicionar'}
                            </button>
                        </div>
                    `;
                });
                html += `</div>`;
            });

            html += `
                <div id="config-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden z-50 flex items-center justify-center p-4">
                    <div class="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90vh] flex flex-col border-t-8 border-andirby-red">
                        <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-lg">
                            <div>
                                <h3 class="text-lg font-bold text-andirby-red" id="modal-title">Configurar</h3>
                                <p class="text-sm text-gray-500 font-bold" id="modal-subtitle">Subtítulo</p>
                            </div>
                            <button onclick="closeModal()" class="text-gray-400 hover:text-red-600 text-3xl font-black">&times;</button>
                        </div>
                        <div class="p-4 overflow-y-auto flex-grow" id="modal-body"></div>
                        <div class="p-4 border-t bg-gray-50" id="modal-footer"></div>
                    </div>
                </div>
            `;
            return html;
        }

        let modalSelections = []; 
        let modalMax = 1;

        window.toggleBordaFlavor = function() {
            const select = document.getElementById('select_borda');
            const div = document.getElementById('borda_flavor_div');
            if(select && select.value !== "0") {
                div.classList.remove('hidden');
            } else {
                div.classList.add('hidden');
            }
            renderModalFooterPizza();
        }

        function openConfigModal(id) {
            const item = state.items.find(i => i.id === id);
            state.modalItem = item;
            modalSelections = [];
            
            document.getElementById('modal-title').innerText = item.category;
            document.getElementById('modal-subtitle').innerText = item.name + " - " + formatMoney(item.price);
            
            const body = document.getElementById('modal-body');
            
            if (item.category.includes('Pizzas')) {
                modalMax = 1;
                if(item.name.includes('2 Sabores')) modalMax = 2;
                if(item.name.includes('3 Sabores')) modalMax = 3;

                let showSalgadas = true; let showDoces = true;
                const nameLower = item.name.toLowerCase();
                if (nameLower.includes('salgada') && !nameLower.includes('doce')) showDoces = false;
                else if (nameLower.includes('doce') && !nameLower.includes('salgada')) showSalgadas = false;
                
                let html = `<p class="mb-4 text-sm bg-yellow-100 p-2 rounded text-yellow-800 font-bold">Escolha até ${modalMax} sabor(es):</p>`;
                
                if (showSalgadas) {
                    html += `<h4 class="font-bold text-andirby-red border-b mb-2 mt-4">Salgadas</h4><div class="space-y-2">`;
                    FLAVORS.salgadas.forEach((f, idx) => {
                        const isUnavailable = state.settings.unavailable_flavors.includes(f.name);
                        html += `
                            <div class="p-3 border rounded ${isUnavailable ? 'bg-gray-100 opacity-50' : 'hover:bg-gray-50 cursor-pointer'}" 
                                 ${!isUnavailable ? `onclick="togglePizzaFlavor(${idx}, 'salgadas')"` : ''}>
                                <div class="flex items-start">
                                    <input type="checkbox" id="chk_salgadas_${idx}" class="w-5 h-5 text-red-600 mt-1 mr-3 pointer-events-none" ${isUnavailable ? 'disabled' : ''}>
                                    <div>
                                        <span class="font-bold text-gray-800 block">${f.name} ${isUnavailable ? '<span class="text-xs text-red-600">(Esgotado)</span>' : ''}</span>
                                        ${f.desc ? `<p class="text-xs text-gray-500 italic mt-1 leading-tight">${f.desc}</p>` : ''}
                                    </div>
                                </div>
                            </div>`;
                    });
                    html += `</div>`;
                }
                if (showDoces) {
                    html += `<h4 class="font-bold text-andirby-red border-b mb-2 mt-4">Doces</h4><div class="space-y-2">`;
                    FLAVORS.doces.forEach((f, idx) => {
                        const isUnavailable = state.settings.unavailable_flavors.includes(f.name);
                        html += `
                            <div class="p-3 border rounded ${isUnavailable ? 'bg-gray-100 opacity-50' : 'hover:bg-gray-50 cursor-pointer'}" 
                                 ${!isUnavailable ? `onclick="togglePizzaFlavor(${idx}, 'doces')"` : ''}>
                                <div class="flex items-start">
                                    <input type="checkbox" id="chk_doces_${idx}" class="w-5 h-5 text-red-600 mt-1 mr-3 pointer-events-none" ${isUnavailable ? 'disabled' : ''}>
                                    <div>
                                        <span class="font-bold text-gray-800 block">${f.name} ${isUnavailable ? '<span class="text-xs text-red-600">(Esgotado)</span>' : ''}</span>
                                        ${f.desc ? `<p class="text-xs text-gray-500 italic mt-1 leading-tight">${f.desc}</p>` : ''}
                                    </div>
                                </div>
                            </div>`;
                    });
                    html += `</div>`;
                }

                // --- ADICIONAL DE BORDA INTELIGENTE ---
                let bordas = state.items.filter(i => i.category === 'Bordas Recheadas' && i.active === 1);
                if(item.name.toLowerCase().includes('gigante') || item.category.toLowerCase().includes('gigante')) {
                    bordas = bordas.filter(b => b.name.toLowerCase().includes('gigante'));
                } else if(item.name.toLowerCase().includes('família') || item.category.toLowerCase().includes('família')) {
                    bordas = bordas.filter(b => b.name.toLowerCase().includes('família'));
                }

                if(bordas.length > 0) {
                    html += `<h4 class="font-bold text-andirby-red border-b mb-2 mt-6">Borda Recheada (Opcional)</h4>
                    <select id="select_borda" onchange="toggleBordaFlavor()" class="w-full p-3 border-2 rounded-lg font-bold text-gray-700 outline-none focus:border-andirby-red mb-2">
                        <option value="0">Sem Borda (+ R$ 0,00)</option>
                        ${bordas.map(b => `<option value="${b.id}">${b.name} (+ ${formatMoney(b.price)})</option>`).join('')}
                    </select>
                    <div id="borda_flavor_div" class="hidden mb-4">
                        <label class="text-sm font-bold text-gray-600 block mb-1">Qual o sabor da borda?</label>
                        <select id="borda_flavor_input" class="w-full border-2 p-3 rounded-lg font-bold text-gray-700 outline-none focus:border-andirby-red" onchange="renderModalFooterPizza()">
                            <option value="Catupiry">Catupiry</option>
                            <option value="Cheddar">Cheddar</option>
                            <option value="Chocolate">Chocolate</option>
                            <option value="Mussarela">Mussarela</option>
                        </select>
                    </div>`;
                }
                
                // Observações Específicas do Item
                html += `
                    <div class="mt-4 pt-4 border-t border-gray-200">
                        <label class="text-sm font-bold text-gray-600 block mb-1">Observações do item (Opcional)</label>
                        <textarea id="item_obs_input" placeholder="Ex: Tirar cebola, sem orégãos..." class="w-full border-2 p-2 rounded-lg text-sm outline-none focus:border-andirby-red"></textarea>
                    </div>`;

                body.innerHTML = html;
                renderModalFooterPizza();

            } else if (item.category.includes('Esfihas')) {
                modalMax = 1;
                if(item.name.includes('10')) modalMax = 10;
                if(item.name.includes('20')) modalMax = 20;

                modalSelections = {};
                FLAVORS.esfihas.forEach(f => modalSelections[f.name] = 0);

                let html = `<p class="mb-4 text-sm bg-yellow-100 p-2 rounded text-yellow-800 font-bold" id="esfiha-counter">Faltam escolher: ${modalMax}</p>`;
                html += `<div class="space-y-3">`;
                FLAVORS.esfihas.forEach((f, idx) => {
                    const isUnavailable = state.settings.unavailable_flavors.includes(f.name);
                    html += `
                        <div class="flex justify-between items-center p-2 border rounded ${isUnavailable ? 'bg-gray-100 opacity-50' : 'bg-white'}">
                            <span class="font-bold text-gray-700">${f.name} ${isUnavailable ? '<small class="text-red-500">(Esgotado)</small>' : ''}</span>
                            <div class="flex items-center gap-3">
                                <button onclick="changeEsfihaQty(${idx}, -1)" class="w-8 h-8 bg-gray-200 rounded font-bold text-xl flex items-center justify-center" ${isUnavailable ? 'disabled' : ''}>-</button>
                                <span id="qty_esfiha_${idx}" class="font-bold w-4 text-center">0</span>
                                <button onclick="changeEsfihaQty(${idx}, 1)" class="w-8 h-8 bg-andirby-yellow rounded font-bold text-xl flex items-center justify-center" ${isUnavailable ? 'disabled' : ''}>+</button>
                            </div>
                        </div>`;
                });
                html += `</div>`;

                // Observações Específicas do Item
                html += `
                    <div class="mt-4 pt-4 border-t border-gray-200">
                        <label class="text-sm font-bold text-gray-600 block mb-1">Observações do item (Opcional)</label>
                        <textarea id="item_obs_input" placeholder="Ex: Bem assada, sem cebola..." class="w-full border-2 p-2 rounded-lg text-sm outline-none focus:border-andirby-red"></textarea>
                    </div>`;

                body.innerHTML = html;
                renderModalFooterEsfiha();
            }

            document.getElementById('config-modal').classList.remove('hidden');
        }

        function togglePizzaFlavor(idx, type) {
            const flavorObj = FLAVORS[type][idx];
            const flavorName = flavorObj.name;
            const pos = modalSelections.indexOf(flavorName);
            
            if (pos > -1) { modalSelections.splice(pos, 1); } 
            else {
                if (modalSelections.length < modalMax) modalSelections.push(flavorName);
                else showToast(`Máximo de ${modalMax} sabores permitidos!`);
            }
            
            FLAVORS.salgadas.forEach((f, i) => { const chk = document.getElementById(`chk_salgadas_${i}`); if(chk) chk.checked = modalSelections.includes(f.name); });
            FLAVORS.doces.forEach((f, i) => { const chk = document.getElementById(`chk_doces_${i}`); if(chk) chk.checked = modalSelections.includes(f.name); });
            renderModalFooterPizza();
        }

        function renderModalFooterPizza() {
            const valid = modalSelections.length > 0 && modalSelections.length <= modalMax;
            
            let extraPrice = 0;
            const bordaSelect = document.getElementById('select_borda');
            if (bordaSelect && bordaSelect.value !== "0") {
                const bItem = state.items.find(i => i.id == bordaSelect.value);
                if(bItem) extraPrice = bItem.price;
            }
            
            const finalPrice = state.modalItem.price + extraPrice;

            const btn = `
                <button onclick="confirmModalItem()" class="w-full py-3 rounded-lg font-bold text-white transition flex justify-between items-center px-5 shadow-lg ${valid ? 'bg-andirby-red hover-bg-andirby-red' : 'bg-gray-400 cursor-not-allowed'}" ${!valid ? 'disabled' : ''}>
                    <span>Adicionar (${modalSelections.length}/${modalMax})</span>
                    <span class="text-lg">${formatMoney(finalPrice)}</span>
                </button>`;
            document.getElementById('modal-footer').innerHTML = btn;
        }

        function changeEsfihaQty(idx, diff) {
            const flavorName = FLAVORS.esfihas[idx].name;
            const currentTotal = Object.values(modalSelections).reduce((a, b) => a + b, 0);
            if (diff > 0 && currentTotal >= modalMax) return showToast(`Limite de ${modalMax} atingido!`);
            if (diff < 0 && modalSelections[flavorName] <= 0) return;

            modalSelections[flavorName] += diff;
            document.getElementById(`qty_esfiha_${idx}`).innerText = modalSelections[flavorName];
            
            const newTotal = Object.values(modalSelections).reduce((a, b) => a + b, 0);
            document.getElementById('esfiha-counter').innerText = `Faltam escolher: ${modalMax - newTotal}`;
            renderModalFooterEsfiha();
        }

        function renderModalFooterEsfiha() {
            const currentTotal = Object.values(modalSelections).reduce((a, b) => a + b, 0);
            const valid = currentTotal === modalMax;
            const btn = `
                <button onclick="confirmModalItem()" class="w-full py-3 rounded-lg font-black text-black transition flex justify-between px-5 ${valid ? 'bg-andirby-yellow hover:bg-yellow-500 shadow-lg' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}" ${!valid ? 'disabled' : ''}>
                    <span>Confirmar Combo</span>
                    <span class="text-lg">${formatMoney(state.modalItem.price)}</span>
                </button>`;
            document.getElementById('modal-footer').innerHTML = btn;
        }

        function confirmModalItem() {
            let details = "";
            let finalPrice = state.modalItem.price;

            if (state.modalItem.category.includes('Pizzas')) {
                details = modalSelections.join(' + ');
                const bordaSelect = document.getElementById('select_borda');
                if (bordaSelect && bordaSelect.value !== "0") {
                    const bItem = state.items.find(i => i.id == bordaSelect.value);
                    const bFlavorInput = document.getElementById('borda_flavor_input');
                    const bFlavor = bFlavorInput ? bFlavorInput.value.trim() : '';
                    if(bItem) {
                        details += `\n+ ${bItem.name}${bFlavor ? ` de ${bFlavor}` : ''}`;
                        finalPrice += bItem.price;
                    }
                }
            } else if (state.modalItem.category.includes('Esfihas')) {
                const picked = [];
                for(let f in modalSelections) {
                    if(modalSelections[f] > 0) picked.push(`${modalSelections[f]}x ${f}`);
                }
                details = picked.join(', ');
            }

            // Captura as observações por item
            const obsInput = document.getElementById('item_obs_input');
            if (obsInput && obsInput.value.trim() !== '') {
                details += `\n*Obs: ${obsInput.value.trim()}*`;
            }

            state.cart.push({
                type: 'configured',
                name: `${state.modalItem.category} - ${state.modalItem.name}`,
                details: details,
                price: finalPrice
            });
            
            closeModal();
            render();
            showSuccessModal(); 
        }

        function authHeaders() { return { 'Authorization': state.adminToken, 'Content-Type': 'application/json' }; }

        async function loadAdminOrders() {
            try {
                const res = await fetch('/api/admin/orders', { headers: authHeaders() });
                if(res.status === 401) { navigate('menu'); return; }
                state.adminOrders = await res.json();
                lastKnownOrderId = state.adminOrders.length > 0 ? state.adminOrders[0].id : 0;
                app.innerHTML = renderAdminOrders();
                startAdminPolling(); 
            } catch(e) { navigate('menu'); }

        function startAdminPolling() {
            if(orderPollingInterval) clearInterval(orderPollingInterval);
            orderPollingInterval = setInterval(async () => {
                if(state.view !== 'admin_orders') return; 
                try {
                    const liveIndicator = document.getElementById('live-indicator');
                    if(liveIndicator) liveIndicator.classList.replace('text-green-500', 'text-yellow-500');

                    const res = await fetch('/api/admin/orders', { headers: authHeaders() });
                    if(!res.ok) return;
                    
                    const newOrders = await res.json();
                    if(liveIndicator) setTimeout(() => liveIndicator.classList.replace('text-yellow-500', 'text-green-500'), 500);

                    if(newOrders.length > 0) {
                        const latestId = newOrders[0].id;
                        if(lastKnownOrderId !== -1 && latestId > lastKnownOrderId) {
                            playDingDong(); showToast("🔔 NOVO PEDIDO RECEBIDO!");
                        }
                        lastKnownOrderId = latestId;
                    }
                    if(JSON.stringify(state.adminOrders) !== JSON.stringify(newOrders)) {
                        state.adminOrders = newOrders;
                        document.getElementById('app').innerHTML = renderAdminOrders();
                    }
                } catch(e) {}
            }, 30000); 
        }

        }

        function printOrder(id) {
            const order = state.adminOrders.find(o => o.id === id);
            const items = JSON.parse(order.items_json);
            let printHtml = `
                <div style="text-align:center;margin-bottom:10px;font-weight:bold;">ANDIRBY'S PIZZARIA<br>Pedido #${order.id}<br>${formatDate(order.created_at)}</div>
                <div style="border-top:1px dashed black;border-bottom:1px dashed black;padding:5px 0;margin-bottom:10px;">
                    <strong>Cli:</strong> ${order.customer_name}<br>
                    <strong>Tel:</strong> ${order.customer_whatsapp}<br>
                    <strong>Tipo:</strong> ${order.type}<br>
                    <strong>Pagamento:</strong> ${order.payment_method || ''}<br>
                    ${order.type==='Entrega'?`<strong>End:</strong> ${order.customer_address}`:''}
                </div>
                <table style="width:100%;font-size:12px;margin-bottom:10px;">
                    ${items.map(i => `<tr><td style="padding-bottom:5px;"><b>${i.name}</b><br><small style="white-space: pre-line;">${i.details||''}</small></td><td style="text-align:right;vertical-align:top;">${formatMoney(i.price)}</td></tr>`).join('')}
                </table>
                <div style="border-top:1px dashed black;padding-top:5px;text-align:right;">Subtotal: ${formatMoney(order.subtotal)}<br>${order.type==='Entrega'?`Taxa: ${formatMoney(order.delivery_fee)}<br>`:''}<strong>TOTAL: ${formatMoney(order.total)}</strong></div>
                <div style="text-align:center;margin-top:15px;font-size:11px;">Obrigado pela preferência!</div>
            `;
            document.getElementById('print-area').innerHTML = printHtml; 
            window.print();
        }

        function renderAdminMenu() {
            let html = renderAdminNav() + `<h2 class="text-2xl font-black mb-6">Configurações & Gestão</h2>`;
            
            // Formulário de Adicionar Categoria/Item
            html += `
                <div class="bg-gray-50 p-5 rounded-lg shadow-inner border border-gray-300 mb-8 border-l-4 border-andirby-red">
                    <h3 class="font-bold text-lg mb-3 text-andirby-red flex items-center gap-2">➕ Adicionar Item ao Cardápio</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <input type="text" id="new_cat" placeholder="Categoria (Ex: Porções, Bebidas)" class="border-2 p-2 rounded focus:border-andirby-red outline-none">
                        <input type="text" id="new_name" placeholder="Nome do Item" class="border-2 p-2 rounded focus:border-andirby-red outline-none">
                        <input type="text" id="new_desc" placeholder="Descrição / Ingredientes (Opcional)" class="border-2 p-2 rounded focus:border-andirby-red outline-none sm:col-span-2">
                        <input type="number" id="new_price" placeholder="Preço (R$)" step="0.10" class="border-2 p-2 rounded focus:border-andirby-red outline-none">
                        <button onclick="addNewItem()" class="bg-green-600 text-white font-bold p-2 rounded hover:bg-green-700 transition shadow-md">Gravar Item</button>
                    </div>
                </div>
            `;

            // Configurações Globais
            html += `
                <div class="bg-white p-5 rounded-lg shadow mb-8 border-t-4 border-andirby-yellow">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="text-sm font-bold block mb-1 text-gray-700">Status do Restaurante</label>
                            <select id="cfg_is_open" class="border-2 p-2 rounded w-full font-bold ${state.settings.is_open === '1' ? 'bg-green-100' : 'bg-red-100'}">
                                <option value="1" ${state.settings.is_open === '1' ? 'selected' : ''}>🟢 Aberto - Aceitando Pedidos</option>
                                <option value="0" ${state.settings.is_open === '0' ? 'selected' : ''}>🔴 Fechado - Bloquear Carrinho</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-sm font-bold block mb-1 text-gray-700">Taxa de Entrega (R$)</label>
                            <input type="number" id="cfg_delivery" value="${state.settings.delivery_fee}" step="0.10" class="border-2 p-2 rounded w-full font-bold">
                        </div>
                        <div class="md:col-span-2">
                            <label class="text-sm font-bold block mb-1 text-purple-700">Webhook URL (Integração n8n)</label>
                            <input type="text" id="cfg_webhook" value="${state.settings.webhook_url}" placeholder="https://seu-n8n.com/webhook/..." class="border-2 p-2 rounded w-full font-mono text-sm">
                            <p class="text-xs text-gray-500 mt-1">Disparado no novo pedido e a cada alteração de status.</p>
                        </div>
                    </div>
                    
                    <h3 class="font-bold text-red-600 border-t pt-4 mb-2">Sabores Indisponíveis (Esgotados)</h3>
                    <p class="text-xs text-gray-500 mb-3">Marque os sabores que acabaram para bloquear no site.</p>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 max-h-48 overflow-y-auto p-2 border rounded">
                        ${[...FLAVORS.salgadas, ...FLAVORS.doces, ...FLAVORS.esfihas].map(f => `
                            <label class="flex items-center space-x-2 text-sm cursor-pointer">
                                <input type="checkbox" class="flavor-unavailable-chk" value="${f.name}" ${state.settings.unavailable_flavors.includes(f.name) ? 'checked' : ''}>
                                <span class="truncate" title="${f.name}">${f.name}</span>
                            </label>
                        `).join('')}
                    </div>

                    <button onclick="saveSettings()" class="mt-6 bg-andirby-red text-white px-4 py-3 rounded font-black hover-bg-andirby-red w-full shadow-md">Salvar Configurações</button>
                </div>
                
                <h3 class="font-black text-xl mb-4 border-b pb-2">Lista de Produtos Cadastrados</h3>
                <div class="space-y-3">
            `;

            state.items.forEach(item => {
                html += `
                    <div class="bg-white p-3 rounded-lg shadow-sm border flex flex-col sm:flex-row gap-2 items-start sm:items-center">
                        <input type="text" id="edit_cat_${item.id}" value="${item.category}" class="border-2 p-2 rounded font-bold w-full sm:w-40 text-sm focus:border-andirby-red outline-none" title="Categoria">
                        
                        <div class="flex-grow w-full flex flex-col gap-1">
                            <input type="text" id="edit_name_${item.id}" value="${item.name}" class="border-2 p-2 rounded font-bold w-full text-sm focus:border-andirby-red outline-none" title="Nome">
                            <input type="text" id="edit_desc_${item.id}" value="${item.description || ''}" placeholder="Descrição (Opcional)" class="border-2 p-1 rounded text-xs w-full text-gray-600 focus:border-andirby-red outline-none">
                        </div>

                        <input type="number" id="edit_price_${item.id}" value="${item.price}" step="0.10" class="border-2 p-2 rounded w-full sm:w-24 font-bold text-andirby-red focus:border-andirby-red outline-none">
                        
                        <select id="edit_active_${item.id}" class="border-2 p-2 rounded font-bold w-full sm:w-24 text-sm">
                            <option value="1" ${item.active ? 'selected':''}>Ativo</option>
                            <option value="0" ${!item.active ? 'selected':''}>Inativo</option>
                        </select>
                        <button onclick="updateItem(${item.id})" class="bg-gray-800 text-white px-4 py-2 rounded font-bold hover:bg-black w-full sm:w-auto shadow">Salvar</button>
                    </div>`;
            });
            return html + `</div>`;
        }

        async function addNewItem() {
            const payload = {
                category: document.getElementById('new_cat').value,
                name: document.getElementById('new_name').value,
                description: document.getElementById('new_desc').value,
                price: parseFloat(document.getElementById('new_price').value)
            };
            if(!payload.category || !payload.name || isNaN(payload.price)) return alert("Preencha categoria, nome e preço obrigatoriamente.");
            
            await fetch('/api/admin/items', { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload) });
            showToast("Novo item gravado com sucesso!");
            
            document.getElementById('new_cat').value = '';
            document.getElementById('new_name').value = '';
            document.getElementById('new_desc').value = '';
            document.getElementById('new_price').value = '';
            fetchMenuData();
        }

        async function saveSettings() {
            const unavailable = [];
            document.querySelectorAll('.flavor-unavailable-chk:checked').forEach(chk => unavailable.push(chk.value));

            const payload = { 
                is_open: document.getElementById('cfg_is_open').value,
                delivery_fee: document.getElementById('cfg_delivery').value, 
                webhook_url: document.getElementById('cfg_webhook').value,
                unavailable_flavors: unavailable
            };
            
            await fetch('/api/admin/settings', { method: 'PUT', headers: authHeaders(), body: JSON.stringify(payload) });
            showToast("Configurações salvas!"); 
            fetchMenuData();
        }

        async function updateItem(id) {
            const payload = {
                category: document.getElementById(`edit_cat_${id}`).value, 
                name: document.getElementById(`edit_name_${id}`).value,
                description: document.getElementById(`edit_desc_${id}`).value,
                price: parseFloat(document.getElementById(`edit_price_${id}`).value),
                active: parseInt(document.getElementById(`edit_active_${id}`).value)
            };
            await fetch(`/api/admin/items/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(payload) });
            await fetchMenuData(); showToast("Item atualizado!");
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-andirby-yellow text-black font-black px-6 py-3 rounded-lg shadow-xl z-50 transition-opacity duration-300';
            toast.innerText = msg; document.body.appendChild(toast);
            setTimeout(() => { toast.classList.add('opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        init();
    </script>
</body>
</html>
